<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Free Sample</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
        <div class="logo">River</div>

            <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            </ul>

        </nav>
    </header>

    <section class="sample-hero">
        
       <h1>Order Your Free Dessert Sample</h1>

            <p>
            Experience the taste of authentic Italian desserts.  
            Choose your favorite and enjoy a free sample from River.
            </p>

    </section>

    <section class="sample-form-section">

        <h2>Request Your Free Sample</h2>

            <form class="sample-form">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <input type="text" placeholder="Enter your delivery address" required>
            </div>

            <div class="form-group">
                <label>Select Dessert</label>
                <select required>
                    <option value="">Choose a dessert</option>
                    <option>Tiramisu</option>
                    <option>Panna Cotta</option>
                    <option>Cannoli</option>
                    <option>Chocolate Cake</option>
                    <option>Gelato</option>
                    <option>Sfogliatella</option>
                    <option>Zabaglione</option>
                    <option>Amaretti</option>
                    <option>Ricotta Cheesecake</option>
                    <option>Biscotti</option>
                    <option>Cassata</option>
                    <option>Panettone</option>
                </select>
            </div>

            <div class="form-group">
                <label>Message (Optional)</label>
                <textarea placeholder="Special request"></textarea>
            </div>

            <button type="submit" class="sample-btn-main">Request Free Sample</button>

            </form>

    </section>

    <footer>
    <p>© 2026 River Desserts — Made with love</p>
    </footer>

</body>
</html>
